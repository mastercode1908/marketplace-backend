spring.application.name=MarketPlaceSystem


#server.forward-headers-strategy=native
#spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:3306/OnlineMarketPlaceSystem
#spring.datasource.username=root
#spring.datasource.password=123456

# ========== MySQL ==========
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.show-sql: true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=create

# ========== PostgreSQL (RAG) ==========
postgres.datasource.url=${POSTGRES_URL}
postgres.datasource.username=${POSTGRES_USER}
postgres.datasource.password=${POSTGRES_PASSWORD}
postgres.datasource.driver-class-name=org.postgresql.Driver

postgres.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
postgres.jpa.show-sql=true
postgres.jpa.hibernate.ddl-auto=none



debug=false


spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Link frontend để gửi verify / reset
app.frontend.url=${FRONTEND_URL}
domain.backend.url=${DOMAIN_URL}

# Google OAuth
google.client.id=${GOOGLE_CLIENT_ID}
google.client.secret=${GOOGLE_CLIENT_SECRET}
google.redirect.uri=${GOOGLE_REDIRECT_URI}
google.token.uri=https://oauth2.googleapis.com/token
google.userinfo.uri=https://www.googleapis.com/oauth2/v3/userinfo


# Spring Boot (Tomcat embedded) multipart config
# Giới hạn file đơn
spring.servlet.multipart.max-file-size=50MB
# Giới hạn tổng request (upload nhiều file cùng lúc)
spring.servlet.multipart.max-request-size=200MB

# Storage provider
storage.provider=cloudinary

# Cloudinary config
cloudinary.cloud_name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api_key=${CLOUDINARY_API_KEY}
cloudinary.api_secret=${CLOUDINARY_API_SECRET}
cloudinary.folder=${CLOUDINARY_FOLDER}


# VNPAY config
vnpay.tmnCode=${VNP_TMN_CODE}
vnpay.hashSecret=${VNP_HASH_SECRET}
vnpay.payUrl=https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
vnpay.returnUrl=${FRONTEND_URL}/payment/return
vnpay.ipnUrl=${BACKEND_URL}/api/payment/vnpay/ipn
vnp.ApiUrl =https://sandbox.vnpayment.vn/merchant_webapi/api/transaction


# JWT config
jwt.secret=${JWT_SECRET}

# Retry database
spring.datasource.hikari.initializationFailTimeout=-1


# OpenAI Configuration
openai.api.key=${OPENAI_API_KEY}
openai.model.embedding=${OPENAI_MODEL_EMBEDDING}
openai.model.chat=${OPENAI_MODEL_CHAT}
# OpenAI Mock Mode (set to true to use dummy data, false to use real API)
openai.mock.mode=${OPENAI_MOCK_MODE}

# Gemini Configuration
gemini.api.key=${GEMINI_API_KEY}
gemini.model.embedding=${GEMINI_MODEL_EMBEDDING}
gemini.model.chat=${GEMINI_MODEL_CHAT}
gemini.mock.mode=${GEMINI_MOCK_MODE}

# Sendgrid Email Api
sendgrid.api.key=${SENDGRID_API_KEY}
sendgrid.from.email=${SENDGRID_FROM_EMAIL}
sendgrid.from.name=${SENDGRID_FROM_NAME}


# Disable Spring AI auto-configuration (we use direct HTTP API)
#spring.autoconfigure.exclude=org.springframework.ai.model.google.genai.autoconfigure.chat.GoogleGenAiChatAutoConfiguration,org.springframework.ai.model.google.genai.autoconfigure.embedding.GoogleGenAiEmbeddingAutoConfiguration
